apiVersion: apps/v1
kind: Deployment
metadata:
  name: lawfirm-backend-green
  namespace: lawfirm
  labels:
    app: lawfirm-backend
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lawfirm-backend
      version: green
  template:
    metadata:
      labels:
        app: lawfirm-backend
        version: green
    spec:
      containers:
        - name: backend
          image: hardik144/lawfirm-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 40
            periodSeconds: 20