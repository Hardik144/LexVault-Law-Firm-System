services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lawfirm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lawfirmdb
      POSTGRES_USER: lawfirm
      POSTGRES_PASSWORD: lawfirm123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawfirm -d lawfirmdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - lawfirm-net

  # ─── Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lawfirm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://lawfirm:lawfirm123@postgres:5432/lawfirmdb
      JWT_SECRET: super-secret-jwt-key-change-in-production-32chars
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: production
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 10485760
      FRONTEND_URL: http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - lawfirm-net

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lawfirm-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - lawfirm-net

  # ─── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: lawfirm-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - lawfirm-net

  # ─── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.2
    container_name: lawfirm-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./devops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./devops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - lawfirm-net

volumes:
  postgres_data:
  uploads_data:
  prometheus_data:
  grafana_data:

networks:
  lawfirm-net:
    driver: bridge